<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="vieport" content="width=device-witdh">
    <title> Paleta de Cores Personalizada </title>
</head>

<body>

    <h2> Formulário</h2>

    <form>

        <p>
            <label> Nome: </label>
            <input type=" text" id="nome" minlength="3" maxlength="6" required>
        </p>

        <p>
            <label> Email:</label>
            <input type="number">
        </p>

        <p>
            <label> Data: </label>
            <Input type="datetime-local">
        </p>

        <P>
            <label> WhatsApp</label>
            <input type="tel" placeholder="479888888888" pattern="[0-9]{11}">
        </P>

        <p>
            <label> Preferencia de mesa </label>
            <select>
                <option> Perto da Janela</option>
                <option> Próximo ao Jardim</option>
                <option> Tanto faz</option>
            </select>
        </p>

        <P>
            <label for="numeroPessoas"> Número de Pessoas: </label>
            <input id="numeroPessoas" type="number" min="1" max="5">
        </p>

        <p>
            <label> Observações: </label>
            <textarea></textarea>
        </p>

        <p>
            <button> Enviar </button>
        </p>

    </form>

</body>
